<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#00ffa3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer container: the "wrap" (rounded square with ZK-seal corners) -->
  <rect x="4" y="4" width="56" height="56" rx="10" ry="10"/>
  <!-- Place (circle) — a Petri net token location -->
  <circle cx="20" cy="32" r="6.5"/>
  <!-- Arc arrow -->
  <line x1="27.5" y1="32" x2="36.5" y2="32"/>
  <polyline points="33,28 37,32 33,36"/>
  <!-- Transition (square) — a Petri net action -->
  <rect x="38" y="25" width="14" height="14" rx="1.5"/>
</svg>
