<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitwrap - Petri Net Contracts</title>
    <style>
        :root {
            --bg: #0d0d0f;
            --bg-alt: #141416;
            --bg-card: #1a1a1e;
            --text: #e8e8e8;
            --text-muted: #888;
            --accent: #00ffa3;
            --accent-hover: #00dd8a;
            --accent-dim: rgba(0, 255, 163, 0.1);
            --border: #2a2a2e;
            --radius: 6px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --mono: "SF Mono", "Fira Code", "Fira Mono", monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .plugin-container {
            max-width: 860px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* Header */
        .plugin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .plugin-title {
            font-family: var(--mono);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.02em;
        }

        .plugin-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .status {
            font-size: 0.75rem;
            font-family: var(--mono);
            padding: 4px 10px;
            border-radius: 4px;
            background: var(--bg-alt);
            border: 1px solid var(--border);
        }

        .status.connected {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .status.standalone {
            color: var(--text-muted);
        }

        /* Template Grid */
        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .tmpl-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .tmpl-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 14px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.1s;
        }

        .tmpl-card:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .tmpl-card.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .tmpl-badge {
            display: inline-block;
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 2px 8px;
            border-radius: 3px;
            margin-bottom: 8px;
        }

        .tmpl-card.selected .tmpl-badge {
            background: rgba(0, 255, 163, 0.2);
        }

        .tmpl-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tmpl-card p {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Generate Button */
        .generate-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-generate {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: var(--font);
            transition: background 0.2s, transform 0.1s;
        }

        .btn-generate:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .generate-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Code Output */
        .code-section {
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }

        .code-filename {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .code-actions {
            display: flex;
            gap: 8px;
        }

        .code-output {
            padding: 16px;
            font-family: var(--mono);
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--text);
            white-space: pre;
            overflow-x: auto;
            max-height: 480px;
            overflow-y: auto;
            tab-size: 4;
        }

        /* Action Buttons */
        .actions-bar {
            display: none;
            gap: 8px;
            margin-top: 16px;
        }

        .actions-bar.visible {
            display: flex;
        }

        .btn-action {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: var(--font);
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-action:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-action.primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-action.primary:hover:not(:disabled) {
            background: var(--accent-hover);
            color: var(--bg);
        }

        /* Scrollbar */
        .code-output::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .code-output::-webkit-scrollbar-track {
            background: var(--bg-alt);
        }
        .code-output::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .tmpl-grid {
                grid-template-columns: 1fr;
            }
            .plugin-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="plugin-container">
        <div class="plugin-header">
            <div>
                <div class="plugin-title">bitwrap</div>
                <div class="plugin-subtitle">Petri Net Contract Generator</div>
            </div>
            <div id="status-indicator" class="status">Initializing...</div>
        </div>

        <div class="section-label">Select Template</div>
        <div id="template-grid" class="tmpl-grid"></div>

        <div class="generate-row">
            <button id="generate-btn" class="btn-generate" onclick="handleGenerate()" disabled>Generate</button>
            <span class="generate-hint">Select a template above, then generate Solidity</span>
        </div>

        <div class="code-section">
            <div class="code-header">
                <span id="filename-display" class="code-filename">contract.sol</span>
            </div>
            <pre id="code-output" class="code-output">// Select a template and click Generate</pre>
        </div>

        <div id="actions-bar" class="actions-bar">
            <button id="deploy-remix-btn" class="btn-action primary" onclick="handleDeployToRemix()" style="display:none">Deploy to Remix</button>
            <button id="download-btn" class="btn-action" onclick="handleDownload()">Download .sol</button>
            <button id="copy-btn" class="btn-action" onclick="handleCopy()">Copy</button>
        </div>
    </div>

    <script src="remix-plugin.js"></script>
</body>
</html>
